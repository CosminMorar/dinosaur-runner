<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Dinosaur Runner</title>
    <link rel="stylesheet" href="style.css">
    <script src="play.js"></script>
  </head>
  <body>
    <div class="game-header">
      <div class="game-title">
        <h1>Dinosaur Runner</h1>
      </div>
      <div class="game-description">
        Dinosaur T-Rex Game is a replica of the hidden Chrome browser game that
        appears when there is no internet. Press the "space bar" key to start.
        Make the dinosaur jump by using the "space bar" key or the "up arrow"
        key, and make it duck by using the "down arrow" key.
      </div>
    </div>
    <div class="game-container">
      <img id="dinosaur" src="dinosaur.png" alt="dinosaur png missing" style="top: 300px; left: 50px;">

      <!-- Dinosaur and obstacles will be dynamically introduced here -->

    </div>
  </body>
</html>
